name: inGitDB

on:
  push:
    branches-ignore:
      - renovate/**
  pull_request:
    branches:
      - '**'

jobs:

  Validator:
    runs-on: ubuntu-latest
    steps:

      - name: Checkout code
        uses: actions/checkout@v6

      - name: Setup Go
        uses: actions/setup-go@v6
        with:
          go-version: '1.26'

      - name: Build ingitdb executable
        run: go build -o ingitdb ./cmd/ingitdb

      - run: chmod +x ingitdb

      - name: inGitDB CI
        run: ./ingitdb ci

      - name: Configure git
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

      - name: Stage materialized views
        run: git add -A

      - name: Commit materialized views
        id: commit
        run: |
          if git diff --cached --quiet; then
            echo "No changes to commit"
            echo "changed=false" >> $GITHUB_OUTPUT
          else
            git commit -m "chore: update materialized views [skip ci]"
            echo "changed=true" >> $GITHUB_OUTPUT
          fi

      - name: Push materialized views
        if: steps.commit.outputs.changed == 'true' && github.event_name == 'push'
        run: git push
